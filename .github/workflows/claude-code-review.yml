name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, labeled]
    paths-ignore:
      - "**/*.md"
      - "**/*.lock"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "dist/**"
      - "build/**"
      - "**/__generated__/**"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'claude-review') ||
      (github.event.action != 'labeled' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: --max-turns 15 --model claude-opus-4-7 --permission-mode bypassPermissions
          show_full_output: true

      - name: Remove claude-review label
        if: always() && github.event.action == 'labeled' && github.event.label.name == 'claude-review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label claude-review
